name: Stale

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale PRs needing author action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment.
          stale-pr-message: >
            This PR is waiting on author action and has had no update for 7 days.
            It will be closed in 3 days unless the requested changes are made.
          close-issue-message: Closed due to inactivity.
          close-pr-message: >
            Closed because this PR was waiting on author action and had no update
            after the stale warning. Please get the linked issue approved, make
            the requested updates, then reopen or submit a focused replacement PR.
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 7
          days-before-pr-close: 3
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,help wanted"
          exempt-pr-labels: "blocked-on-maintainer,keep-open,status:approved,security"
          only-labels: "needs-author-action"
