name: PR Gate

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  gate:
    name: Enforce external PR gate
    runs-on: ubuntu-latest
    steps:
      - name: Check PR policy
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const pull_number = pr.number;
            const crypto = require("crypto");
            const maintainerAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const currentLabels = new Set(pr.labels.map((label) => label.name));

            const requiredLabels = {
              "status:approved": { color: "0e8a16", description: "Maintainer-approved issue or PR scope" },
              "needs-author-action": { color: "d93f0b", description: "Waiting on the PR author to fix a required item" },
              "blocked-on-maintainer": { color: "5319e7", description: "Waiting on maintainer action" },
              "keep-open": { color: "1d76db", description: "Do not close automatically" },
              "needs-approved-issue": { color: "b60205", description: "External PR needs an open issue with status:approved" },
              "needs-screenshots": { color: "fbca04", description: "Visual change needs before and after screenshots" },
              "needs-ai-disclosure": { color: "fbca04", description: "PR needs AI assistance disclosure" },
              "needs-human-explanation": { color: "fbca04", description: "PR needs a plain-English explanation" },
              "too-large": { color: "b60205", description: "PR is too large and should be split" },
              "stale": { color: "ededed", description: "No recent activity" }
            };
            const gateManagedFailureLabels = [
              "needs-author-action",
              "needs-approved-issue",
              "needs-screenshots",
              "needs-ai-disclosure",
              "needs-human-explanation",
              "too-large",
              "stale"
            ];

            async function ensureLabels() {
              for (const [name, config] of Object.entries(requiredLabels)) {
                try {
                  await github.rest.issues.getLabel({ owner, repo, name });
                } catch (error) {
                  if (error.status !== 404) throw error;
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: config.color,
                    description: config.description
                  });
                }
              }
            }

            function sectionContent(body, heading) {
              if (!body) return "";
              const headingPattern = new RegExp(`^##\\s+${heading.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\s*$`, "im");
              const match = body.match(headingPattern);
              if (!match || match.index === undefined) return "";
              const start = match.index + match[0].length;
              const rest = body.slice(start);
              const next = rest.search(/^##\s+/m);
              const raw = next === -1 ? rest : rest.slice(0, next);
              return raw
                .replace(/<!--[\s\S]*?-->/g, "")
                .replace(/Fixes\s*#?\s*$/i, "")
                .trim();
            }

            function hasUsefulSection(body, heading) {
              const content = sectionContent(body, heading);
              return content.length >= 12 && !/^none$/i.test(content);
            }

            function hasAnySectionAnswer(body, heading) {
              return sectionContent(body, heading).length > 0;
            }

            function issueNumbersFromBody(body) {
              const numbers = new Set();
              if (!body) return numbers;
              const urlPattern = new RegExp(`https://github\\.com/${owner}/${repo}/issues/(\\d+)`, "gi");
              for (const match of body.matchAll(urlPattern)) numbers.add(Number(match[1]));
              const closingPattern = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
              for (const match of body.matchAll(closingPattern)) numbers.add(Number(match[1]));
              return numbers;
            }

            async function closingIssueNumbers() {
              const numbers = issueNumbersFromBody(pr.body || "");
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 20) {
                        nodes { number }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, { owner, repo, number: pull_number });
              for (const issue of result.repository.pullRequest.closingIssuesReferences.nodes) {
                numbers.add(issue.number);
              }
              return [...numbers];
            }

            async function loadIssues(numbers) {
              const issues = [];
              for (const number of numbers) {
                try {
                  const { data } = await github.rest.issues.get({ owner, repo, issue_number: number });
                  if (!data.pull_request) issues.push(data);
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
              return issues;
            }

            function approvedIssue(issues) {
              return issues.find((issue) =>
                issue.state === "open" &&
                issue.labels.some((label) => label.name === "status:approved")
              );
            }

            function sensitiveChecks(files, issue) {
              if (!issue) return [];
              const issueText = `${issue.title}\n${issue.body || ""}`.toLowerCase();
              const checks = [
                {
                  match: (path) => path === "AGENTS.md",
                  name: "AGENTS.md",
                  keywords: ["agents.md", "agent", "contribution policy", "pr gate"]
                },
                {
                  match: (path) => path === ".github/workflows/release.yml",
                  name: "release workflow",
                  keywords: ["release", "workflow", "sparkle", "appcast"]
                },
                {
                  match: (path) => path === "Package.swift" || path === "Package.resolved",
                  name: "dependencies",
                  keywords: ["dependency", "dependencies", "package.swift", "package.resolved"]
                },
                {
                  match: (path) => path === "Sources/OpenUsage/App/AppContainer.swift",
                  name: "provider registry or ordering",
                  keywords: ["provider", "provider order", "provider ordering", "appcontainer", "provider registry"]
                },
                {
                  match: (path) => path === "Sources/OpenUsage/Stores/DefaultLayout.swift",
                  name: "default layout",
                  keywords: ["defaultlayout", "default layout", "metric default", "provider order"]
                },
                {
                  match: (path) => path === "Sources/OpenUsage/App/UpdaterController.swift" || path === "docs/updates.md",
                  name: "update feed",
                  keywords: ["sparkle", "appcast", "update feed", "updatercontroller", "updater controller", "auto-update", "auto update"]
                },
                {
                  match: (path) => path.startsWith("Sources/OpenUsage/Providers/"),
                  name: "provider changes",
                  keywords: ["provider", "usage data", "auth", "api", "credential"]
                }
              ];

              const missing = [];
              for (const check of checks) {
                if (!files.some((file) => check.match(file.filename))) continue;
                if (!check.keywords.some((keyword) => issueText.includes(keyword))) {
                  missing.push(check.name);
                }
              }
              return missing;
            }

            function hasProviderProof(files, issue) {
              if (!files.some((file) => file.filename.startsWith("Sources/OpenUsage/Providers/"))) {
                return true;
              }
              const issueText = `${issue.title}\n${issue.body || ""}`.toLowerCase();
              const hasDemand = issueText.includes("demand evidence") || issueText.includes("user request") || issueText.includes("community demand");
              const hasUsageData = issueText.includes("usage data") || issueText.includes("usage metrics") || issueText.includes("quota") || issueText.includes("limit");
              const hasFeasibility = issueText.includes("auth/api feasibility") || issueText.includes("auth method") || issueText.includes("credential") || issueText.includes("api");
              const hasFit = issueText.includes("belong") || issueText.includes("fit with openusage") || issueText.includes("selective app") || issueText.includes("usage-tracking scope");
              return hasDemand && hasUsageData && hasFeasibility && hasFit;
            }

            function isVisualChange(files) {
              return files.some((file) =>
                file.filename.startsWith("Sources/OpenUsage/Views/") ||
                file.filename.startsWith("assets/") ||
                file.filename.includes("ShareCard") ||
                file.filename.includes("StatusItem") ||
                file.filename.includes("SettingsScreen") ||
                file.filename.endsWith(".xcassets")
              );
            }

            function screenshotsArePresent(body) {
              const content = sectionContent(body, "Screenshots");
              if (!content || /^not applicable\.?$/i.test(content)) return false;
              return /!\[[^\]]*]\([^)]+\)|https?:\/\/|user-attachments\/assets|github\.com\/user-attachments/i.test(content);
            }

            async function addLabels(labels) {
              const missing = [...new Set(labels)].filter((label) => !currentLabels.has(label));
              if (missing.length === 0) return [];
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: missing
              });
              for (const label of missing) currentLabels.add(label);
              return missing;
            }

            async function removeLabels(labels) {
              const existing = [...new Set(labels)].filter((label) => currentLabels.has(label));
              const removed = [];
              for (const label of existing) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pull_number,
                    name: label
                  });
                  currentLabels.delete(label);
                  removed.push(label);
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
              return removed;
            }

            async function comment(body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body
              });
            }

            function gateCommentMarker(kind, failures) {
              const hash = crypto
                .createHash("sha256")
                .update(`${kind}\n${failures.join("\n")}`)
                .digest("hex")
                .slice(0, 16);
              return `<!-- openusage-pr-gate:${kind}:${hash} -->`;
            }

            async function hasGateComment(marker) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100
              });
              return comments.some((existingComment) => existingComment.body?.includes(marker));
            }

            await ensureLabels();

            if (maintainerAssociations.has(pr.author_association)) {
              core.info(`Skipping maintainer/collaborator PR #${pull_number}.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });
            const totalChangedLines = pr.additions + pr.deletions;
            const issueNumbers = await closingIssueNumbers();
            const issues = await loadIssues(issueNumbers);
            const approved = approvedIssue(issues);

            const hardFailures = [];
            const hardLabels = [];
            const fixableFailures = [];
            const fixableLabels = [];

            if (!approved) {
              hardFailures.push("External PRs require a linked open issue with `status:approved`.");
              hardLabels.push("needs-approved-issue");
            }

            if (totalChangedLines > 1000) {
              hardFailures.push(`This PR changes ${totalChangedLines} lines, which is over the 1,000-line limit.`);
              hardLabels.push("too-large");
            } else if (totalChangedLines > 500) {
              fixableFailures.push(`This PR changes ${totalChangedLines} lines. Please split it or get maintainer confirmation that this size is intentional.`);
              fixableLabels.push("too-large", "needs-author-action");
            }

            if (approved) {
              const missingSensitiveScopes = sensitiveChecks(files, approved);
              if (missingSensitiveScopes.length > 0) {
                hardFailures.push(`The approved issue does not explicitly cover these sensitive areas: ${missingSensitiveScopes.join(", ")}.`);
                hardLabels.push("needs-approved-issue");
              }

              if (!hasProviderProof(files, approved)) {
                hardFailures.push("Provider changes require an approved issue with demand evidence, usage-data proof, auth/API feasibility, and fit rationale.");
                hardLabels.push("needs-approved-issue");
              }
            }

            if (isVisualChange(files) && !screenshotsArePresent(pr.body || "")) {
              fixableFailures.push("This appears to change UI or visual assets, so before and after screenshots are required.");
              fixableLabels.push("needs-screenshots", "needs-author-action");
            }

            if (!hasAnySectionAnswer(pr.body || "", "AI Assistance")) {
              fixableFailures.push("The AI Assistance section is missing or empty. Say `None`, or disclose the tool, generated work, review, and tests.");
              fixableLabels.push("needs-ai-disclosure", "needs-author-action");
            }

            if (!hasUsefulSection(pr.body || "", "Human Explanation")) {
              fixableFailures.push("The Human Explanation section needs a plain-English explanation of what changed and why.");
              fixableLabels.push("needs-human-explanation", "needs-author-action");
            }

            if (hardFailures.length > 0) {
              const labels = await addLabels([...hardLabels, ...fixableLabels]);
              await comment([
                "Closing this PR because it does not meet OpenUsage's external contribution gate.",
                "",
                ...hardFailures.map((failure) => `- ${failure}`),
                "",
                "Next step: open or update an issue, wait for `status:approved`, then submit a small PR that only implements the approved scope.",
                labels.length > 0 ? `\nLabels added: ${labels.map((label) => `\`${label}\``).join(", ")}.` : ""
              ].join("\n"));
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number,
                state: "closed"
              });
              return;
            }

            if (fixableFailures.length > 0) {
              const desiredLabels = new Set(fixableLabels);
              const noLongerNeeded = gateManagedFailureLabels.filter((label) =>
                !desiredLabels.has(label) || label === "stale"
              );
              const removedLabels = await removeLabels(noLongerNeeded);
              const labels = await addLabels(fixableLabels);
              const marker = gateCommentMarker("fixable", fixableFailures);
              if (labels.length > 0 || removedLabels.length > 0 || !(await hasGateComment(marker))) {
                await comment([
                  "This PR needs author action before review.",
                  "",
                  ...fixableFailures.map((failure) => `- ${failure}`),
                  "",
                  "Please update the PR within 5 days. PRs still waiting on author action after that are marked stale and closed 2 days later.",
                  labels.length > 0 ? `\nLabels added: ${labels.map((label) => `\`${label}\``).join(", ")}.` : "",
                  removedLabels.length > 0 ? `\nLabels removed: ${removedLabels.map((label) => `\`${label}\``).join(", ")}.` : "",
                  `\n${marker}`
                ].filter(Boolean).join("\n"));
              }
              return;
            }

            const removedLabels = await removeLabels(gateManagedFailureLabels);
            if (removedLabels.length > 0) {
              await comment([
                "This PR now passes the external contribution gate.",
                "",
                `Labels removed: ${removedLabels.map((label) => `\`${label}\``).join(", ")}.`
              ].join("\n"));
            }

            core.info(`PR #${pull_number} passed external PR gate.`);
