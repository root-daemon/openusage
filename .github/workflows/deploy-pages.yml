# Deploys the gh-pages branch to GitHub Pages.
#
# The repo's Pages source is "GitHub Actions" (not "Deploy from a branch") because GitHub's legacy
# branch-deploy pipeline repeatedly stalled/failed server-side ("Deployment failed, try again later",
# deployments stuck in deployment_queued) in July 2026. This workflow replaces it: release.yml and
# pricing-supplement.yml on main keep pushing files (appcast.xml, pricing_supplement.json) to this
# branch exactly as before, and every push here deploys the branch contents to the live site.
name: Deploy Pages

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
